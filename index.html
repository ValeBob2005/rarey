<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">

<title>AR Rey Matemático</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
}

model-viewer{
    width:100vw;
    height:100vh;
}

</style>
</head>

<body>

<model-viewer

    src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"

    ar
    ar-modes="webxr scene-viewer quick-look"

    camera-controls
    auto-rotate

    shadow-intensity="1"

    alt="Modelo AR"

>

</model-viewer>

</body>
</html>
