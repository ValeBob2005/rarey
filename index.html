<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">

<title>Rey Matemático AR</title>

<style>

body{
    margin:0;
    overflow:hidden;
}

canvas{
    display:block;
}

</style>
</head>

<body>

<script type="module">

//////////////////////////////////////////////////////////
// IMPORTS
//////////////////////////////////////////////////////////

import * as THREE from 'https://unpkg.com/three@0.128.0/build/three.module.js';

import { ARButton } from 'https://unpkg.com/three@0.128.0/examples/jsm/webxr/ARButton.js';

//////////////////////////////////////////////////////////
// ESCENA
//////////////////////////////////////////////////////////

const scene = new THREE.Scene();

//////////////////////////////////////////////////////////
// CAMARA
//////////////////////////////////////////////////////////

const camera = new THREE.PerspectiveCamera(
    70,
    window.innerWidth/window.innerHeight,
    0.01,
    100
);

//////////////////////////////////////////////////////////
// RENDER
//////////////////////////////////////////////////////////

const renderer = new THREE.WebGLRenderer({
    antialias:true,
    alpha:true
});

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

renderer.xr.enabled = true;

document.body.appendChild(
    renderer.domElement
);

//////////////////////////////////////////////////////////
// BOTON AR
//////////////////////////////////////////////////////////

document.body.appendChild(

    ARButton.createButton(
        renderer,
        {
            requiredFeatures:['hit-test']
        }
    )

);

//////////////////////////////////////////////////////////
// LUCES
//////////////////////////////////////////////////////////

const ambient = new THREE.AmbientLight(
    0xffffff,
    1
);

scene.add(ambient);

const dir = new THREE.DirectionalLight(
    0xffffff,
    1.5
);

dir.position.set(10,20,10);

scene.add(dir);

//////////////////////////////////////////////////////////
// GRUPO PRINCIPAL
//////////////////////////////////////////////////////////

const kingGroup = new THREE.Group();

scene.add(kingGroup);

//////////////////////////////////////////////////////////
// MATERIALES
//////////////////////////////////////////////////////////

const matBase = new THREE.MeshPhongMaterial({
    color:0x5A96DC,
    transparent:true,
    opacity:0.45,
    side:THREE.DoubleSide
});

const matBody = new THREE.MeshPhongMaterial({
    color:0xA0AAB4,
    transparent:true,
    opacity:0.55,
    side:THREE.DoubleSide
});

const matCollar = new THREE.MeshPhongMaterial({
    color:0xFFEBAA,
    transparent:true,
    opacity:0.55,
    side:THREE.DoubleSide
});

const matCrown = new THREE.MeshPhongMaterial({
    color:0xFFDC78,
    transparent:true,
    opacity:0.45,
    side:THREE.DoubleSide
});

const matCross = new THREE.MeshPhongMaterial({
    color:0xEB7878
});

//////////////////////////////////////////////////////////
// FUNCION SUPERFICIE PARAMETRICA
//////////////////////////////////////////////////////////

function createSurface(
    uSegments,
    vSegments,
    func,
    material
){

    const geometry =
        new THREE.BufferGeometry();

    const vertices = [];
    const indices = [];

    for(let i=0;i<=uSegments;i++){

        const u = i/uSegments;

        for(let j=0;j<=vSegments;j++){

            const v = j/vSegments;

            const p = func(u,v);

            vertices.push(
                p.x,
                p.y,
                p.z
            );

        }

    }

    for(let i=0;i<uSegments;i++){

        for(let j=0;j<vSegments;j++){

            const a =
                i*(vSegments+1)+j;

            const b =
                a+vSegments+1;

            const c =
                b+1;

            const d =
                a+1;

            indices.push(a,b,d);
            indices.push(b,c,d);

        }

    }

    geometry.setAttribute(
        'position',
        new THREE.Float32BufferAttribute(
            vertices,
            3
        )
    );

    geometry.setIndex(indices);

    geometry.computeVertexNormals();

    return new THREE.Mesh(
        geometry,
        material
    );

}

//////////////////////////////////////////////////////////
// BASE
//////////////////////////////////////////////////////////

const base = createSurface(

    80,
    80,

    (u,v)=>{

        const theta = 2*Math.PI*u;

        const y = 0 + 3*v;

        const r = 5;

        return {

            x:r*Math.cos(theta),
            y:y,
            z:r*Math.sin(theta)

        };

    },

    matBase

);

kingGroup.add(base);

//////////////////////////////////////////////////////////
// HIPERBOLOIDE
//////////////////////////////////////////////////////////

const body = createSurface(

    100,
    100,

    (u,v)=>{

        const theta = 2*Math.PI*u;

        const yMin = 3;
        const yMax = 11.4;

        const y =
            yMin + (yMax-yMin)*v;

        const a = 1.5;
        const c = 5;

        const y0 =
            (yMin+yMax)/2;

        const r =
            a*Math.sqrt(
                1 + ((y-y0)*(y-y0))/(c*c)
            );

        return {

            x:r*Math.cos(theta),
            y:y,
            z:r*Math.sin(theta)

        };

    },

    matBody

);

kingGroup.add(body);

//////////////////////////////////////////////////////////
// COLLAR
//////////////////////////////////////////////////////////

const collar = createSurface(

    80,
    80,

    (u,v)=>{

        const theta = 2*Math.PI*u;

        const yMin = 11.4;
        const yMax = 11.8;

        const y =
            yMin + (yMax-yMin)*v;

        const a = 2.2;
        const c = 0.45;

        const y0 =
            (yMin+yMax)/2;

        const inside =
            1 - ((y-y0)*(y-y0))/(c*c);

        const r =
            a*Math.sqrt(
                Math.max(inside,0)
            );

        return {

            x:r*Math.cos(theta),
            y:y,
            z:r*Math.sin(theta)

        };

    },

    matCollar

);

kingGroup.add(collar);

//////////////////////////////////////////////////////////
// PARABOLOIDE
//////////////////////////////////////////////////////////

const crown = createSurface(

    100,
    100,

    (u,v)=>{

        const theta = 2*Math.PI*u;

        const alpha = 2.6;

        const rho = v;

        const rmax = Math.sqrt(5.2);

        const r =
            alpha*rmax*rho;

        const x =
            r*Math.cos(theta);

        const z =
            r*Math.sin(theta);

        const y =
            11.8 +
            (x*x + z*z)/(alpha*alpha);

        return {

            x:x,
            y:y,
            z:z

        };

    },

    matCrown

);

kingGroup.add(crown);

//////////////////////////////////////////////////////////
// CRUZ
//////////////////////////////////////////////////////////

const crossV = new THREE.Mesh(

    new THREE.BoxGeometry(
        0.8,
        3,
        0.8
    ),

    matCross

);

crossV.position.set(
    0,
    18.5,
    0
);

kingGroup.add(crossV);

const crossH = new THREE.Mesh(

    new THREE.BoxGeometry(
        3,
        0.8,
        0.8
    ),

    matCross

);

crossH.position.set(
    0,
    18.5,
    0
);

kingGroup.add(crossH);

//////////////////////////////////////////////////////////
// CAMPO VECTORIAL EXACTO
//////////////////////////////////////////////////////////

function addVector(
    x,
    y,
    z,
    u,
    v,
    w
){

    const direction =
        new THREE.Vector3(
            u,
            v,
            w
        );

    direction.normalize();

    const origin =
        new THREE.Vector3(
            x,
            y,
            z
        );

    const arrow =
        new THREE.ArrowHelper(
            direction,
            origin,
            1.2,
            0xff0000,
            0.4,
            0.2
        );

    kingGroup.add(arrow);

}

//////////////////////////////////////////////////////////
// GENERAR CAMPO
//////////////////////////////////////////////////////////

for(let x=-6;x<=6;x+=3){

    for(let y=-6;y<=6;y+=3){

        for(let z=0;z<=20;z+=4){

            let u = x + 2*y;

            let v = y*z + 1;

            let w = x - y*y;

            let mag = Math.sqrt(
                u*u +
                v*v +
                w*w
            );

            u /= mag;
            v /= mag;
            w /= mag;

            addVector(
                x*0.2,
                z*0.2,
                y*0.2,
                u,
                v,
                w
            );

        }

    }

}

//////////////////////////////////////////////////////////
// ESCALA GENERAL
//////////////////////////////////////////////////////////

kingGroup.scale.set(
    0.05,
    0.05,
    0.05
);

kingGroup.position.set(
    0,
    -0.5,
    -2
);

//////////////////////////////////////////////////////////
// RENDER LOOP
//////////////////////////////////////////////////////////

renderer.setAnimationLoop(()=>{

    renderer.render(
        scene,
        camera
    );

});

//////////////////////////////////////////////////////////
// RESIZE
//////////////////////////////////////////////////////////

window.addEventListener(
    'resize',
    ()=>{

        camera.aspect =
            window.innerWidth /
            window.innerHeight;

        camera.updateProjectionMatrix();

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );

    }
);

</script>

</body>
</html>
