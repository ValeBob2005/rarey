<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Rey Vectorial 3D</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #111;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>

<script type="module">

import * as THREE from 'https://unpkg.com/three@0.158.0/build/three.module.js';

import { OrbitControls } from 'https://unpkg.com/three@0.158.0/examples/jsm/controls/OrbitControls.js';

//////////////////////////////////////////////////////
// ESCENA
//////////////////////////////////////////////////////

const scene = new THREE.Scene();

scene.background = new THREE.Color(0x111111);

//////////////////////////////////////////////////////
// CAMARA
//////////////////////////////////////////////////////

const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

camera.position.set(20,20,20);

//////////////////////////////////////////////////////
// RENDER
//////////////////////////////////////////////////////

const renderer = new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(window.innerWidth,window.innerHeight);

document.body.appendChild(renderer.domElement);

//////////////////////////////////////////////////////
// CONTROLES
//////////////////////////////////////////////////////

const controls = new OrbitControls(
    camera,
    renderer.domElement
);

controls.enableDamping = true;

//////////////////////////////////////////////////////
// LUCES
//////////////////////////////////////////////////////

const ambient = new THREE.AmbientLight(0xffffff,0.7);

scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0xffffff,1.2);

dirLight.position.set(10,20,10);

scene.add(dirLight);

//////////////////////////////////////////////////////
// MATERIALES
//////////////////////////////////////////////////////

const matBase = new THREE.MeshPhongMaterial({
    color:0x5A96DC,
    transparent:true,
    opacity:0.5
});

const matBody = new THREE.MeshPhongMaterial({
    color:0xA0AAB4,
    transparent:true,
    opacity:0.55
});

const matGold = new THREE.MeshPhongMaterial({
    color:0xFFDC78,
    transparent:true,
    opacity:0.6
});

const matCross = new THREE.MeshPhongMaterial({
    color:0xEB7878
});

//////////////////////////////////////////////////////
// BASE
//////////////////////////////////////////////////////

const baseGeo = new THREE.CylinderGeometry(
    5,
    5,
    3,
    64
);

const base = new THREE.Mesh(baseGeo,matBase);

base.position.y = 1.5;

scene.add(base);

//////////////////////////////////////////////////////
// CUERPO
//////////////////////////////////////////////////////

const bodyGeo = new THREE.HyperboloidGeometry;

//////////////////////////////////////////////////////
// APROXIMACION HIPERBOLOIDE
//////////////////////////////////////////////////////

const body = new THREE.Mesh(

    new THREE.CylinderGeometry(
        2.4,
        1.5,
        8,
        64
    ),

    matBody

);

body.position.y = 7;

scene.add(body);

//////////////////////////////////////////////////////
// COLLAR
//////////////////////////////////////////////////////

const collar = new THREE.Mesh(

    new THREE.SphereGeometry(2.2,64,64),

    matGold

);

collar.scale.y = 0.25;

collar.position.y = 11.5;

scene.add(collar);

//////////////////////////////////////////////////////
// CORONA
//////////////////////////////////////////////////////

const crown = new THREE.Mesh(

    new THREE.ConeGeometry(
        3,
        6,
        64
    ),

    matGold

);

crown.position.y = 15;

scene.add(crown);

//////////////////////////////////////////////////////
// CRUZ
//////////////////////////////////////////////////////

const crossV = new THREE.Mesh(

    new THREE.BoxGeometry(
        0.6,
        2.5,
        0.6
    ),

    matCross

);

crossV.position.y = 19;

scene.add(crossV);

const crossH = new THREE.Mesh(

    new THREE.BoxGeometry(
        2,
        0.6,
        0.6
    ),

    matCross

);

crossH.position.y = 19;

scene.add(crossH);

//////////////////////////////////////////////////////
// CAMPO VECTORIAL
//////////////////////////////////////////////////////

function createVector(x,y,z,u,v,w){

    const dir = new THREE.Vector3(u,v,w);

    dir.normalize();

    const origin = new THREE.Vector3(x,y,z);

    const length = 1.5;

    const color = 0xff0000;

    const arrow = new THREE.ArrowHelper(
        dir,
        origin,
        length,
        color,
        0.4,
        0.2
    );

    scene.add(arrow);

}

//////////////////////////////////////////////////////
// GENERAR CAMPO
//////////////////////////////////////////////////////

for(let x=-6;x<=6;x+=2){

    for(let y=-6;y<=6;y+=2){

        for(let z=0;z<=20;z+=3){

            let u = x + 2*y;

            let v = y*z + 1;

            let w = x - y*y;

            let mag = Math.sqrt(
                u*u + v*v + w*w
            );

            u /= mag;
            v /= mag;
            w /= mag;

            createVector(
                x,
                z,
                y,
                u,
                v,
                w
            );

        }

    }

}

//////////////////////////////////////////////////////
// GRID
//////////////////////////////////////////////////////

const grid = new THREE.GridHelper(
    30,
    30
);

scene.add(grid);

//////////////////////////////////////////////////////
// EJES
//////////////////////////////////////////////////////

const axes = new THREE.AxesHelper(10);

scene.add(axes);

//////////////////////////////////////////////////////
// ANIMACION
//////////////////////////////////////////////////////

function animate(){

    requestAnimationFrame(animate);

    controls.update();

    renderer.render(scene,camera);

}

animate();

//////////////////////////////////////////////////////
// RESIZE
//////////////////////////////////////////////////////

window.addEventListener('resize',()=>{

    camera.aspect =
        window.innerWidth/window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );

});

</script>

</body>
</html>
