<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Rey Matemático AR Exacto</title>

<style>

body{
    margin:0;
    overflow:hidden;
    touch-action:none;
}

#camera{

    position:fixed;
    top:0;
    left:0;

    width:100vw;
    height:100vh;

    object-fit:cover;

    z-index:-2;

    background:black;

}

canvas{

    position:fixed;
    top:0;
    left:0;

    z-index:10;

}

#startButton{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    padding:18px 28px;

    font-size:20px;

    border:none;

    border-radius:12px;

    background:white;

    z-index:100;

}

</style>
</head>

<body>

<video
    id="camera"
    autoplay
    muted
    playsinline>
</video>

<button id="startButton">
INICIAR AR
</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

//////////////////////////////////////////////////////////
// VIDEO
//////////////////////////////////////////////////////////

const video =
    document.getElementById('camera');

const startButton =
    document.getElementById('startButton');

//////////////////////////////////////////////////////////
// ESCENA
//////////////////////////////////////////////////////////

const scene =
    new THREE.Scene();

//////////////////////////////////////////////////////////
// CAMARA
//////////////////////////////////////////////////////////

const camera =
    new THREE.PerspectiveCamera(
        60,
        window.innerWidth/window.innerHeight,
        0.1,
        1000
    );

camera.position.set(0,8,28);

//////////////////////////////////////////////////////////
// RENDER
//////////////////////////////////////////////////////////

const renderer =
    new THREE.WebGLRenderer({

        alpha:true,
        antialias:true

    });

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

document.body.appendChild(
    renderer.domElement
);

//////////////////////////////////////////////////////////
// LUCES
//////////////////////////////////////////////////////////

const ambient =
    new THREE.AmbientLight(
        0xffffff,
        1
    );

scene.add(ambient);

const light =
    new THREE.DirectionalLight(
        0xffffff,
        1.5
    );

light.position.set(10,20,10);

scene.add(light);

//////////////////////////////////////////////////////////
// GRUPO PRINCIPAL
//////////////////////////////////////////////////////////

const kingGroup =
    new THREE.Group();

scene.add(kingGroup);

kingGroup.position.set(
    0,
    -8,
    -30
);

//////////////////////////////////////////////////////////
// MATERIALES
//////////////////////////////////////////////////////////

const matBase =
    new THREE.MeshPhongMaterial({

        color:0x5A96DC,
        transparent:true,
        opacity:0.45,
        side:THREE.DoubleSide

    });

const matBody =
    new THREE.MeshPhongMaterial({

        color:0xA0AAB4,
        transparent:true,
        opacity:0.55,
        side:THREE.DoubleSide

    });

const matCollar =
    new THREE.MeshPhongMaterial({

        color:0xFFEBAA,
        transparent:true,
        opacity:0.55,
        side:THREE.DoubleSide

    });

const matCrown =
    new THREE.MeshPhongMaterial({

        color:0xFFDC78,
        transparent:true,
        opacity:0.45,
        side:THREE.DoubleSide

    });

const matCross =
    new THREE.MeshPhongMaterial({

        color:0xEB7878

    });

//////////////////////////////////////////////////////////
// FUNCION SUPERFICIE PARAMETRICA
//////////////////////////////////////////////////////////

function createSurface(
    uSeg,
    vSeg,
    func,
    material
){

    const geometry =
        new THREE.BufferGeometry();

    const vertices = [];
    const indices = [];

    for(let i=0;i<=uSeg;i++){

        const u = i/uSeg;

        for(let j=0;j<=vSeg;j++){

            const v = j/vSeg;

            const p = func(u,v);

            vertices.push(
                p.x,
                p.y,
                p.z
            );

        }

    }

    for(let i=0;i<uSeg;i++){

        for(let j=0;j<vSeg;j++){

            const a =
                i*(vSeg+1)+j;

            const b =
                a+vSeg+1;

            const c =
                b+1;

            const d =
                a+1;

            indices.push(a,b,d);
            indices.push(b,c,d);

        }

    }

    geometry.setAttribute(
        'position',

        new THREE.Float32BufferAttribute(
            vertices,
            3
        )
    );

    geometry.setIndex(indices);

    geometry.computeVertexNormals();

    return new THREE.Mesh(
        geometry,
        material
    );

}

//////////////////////////////////////////////////////////
// BASE EXACTA
//////////////////////////////////////////////////////////

const base = createSurface(

    120,
    120,

    (u,v)=>{

        const theta =
            2*Math.PI*u;

        const z =
            3*v;

        const r = 5;

        return {

            x:r*Math.cos(theta),
            y:r*Math.sin(theta),
            z:z

        };

    },

    matBase

);

kingGroup.add(base);

//////////////////////////////////////////////////////////
// HIPERBOLOIDE EXACTO
//////////////////////////////////////////////////////////

const body = createSurface(

    150,
    150,

    (u,v)=>{

        const theta =
            2*Math.PI*u;

        const zMin = 3.02;
        const zMax = 11.4;

        const z =
            zMin + (zMax-zMin)*v;

        const a = 1.5;
        const c = 5;

        const z0 =
            (zMin+zMax)/2;

        const r =
            a*Math.sqrt(
                1 +
                ((z-z0)*(z-z0))/(c*c)
            );

        return {

            x:r*Math.cos(theta),
            y:r*Math.sin(theta),
            z:z

        };

    },

    matBody

);

kingGroup.add(body);

//////////////////////////////////////////////////////////
// ELIPSOIDE EXACTO
//////////////////////////////////////////////////////////

const collar = createSurface(

    120,
    120,

    (u,v)=>{

        const theta =
            2*Math.PI*u;

        const zMin = 11.4;
        const zMax = 11.8;

        const z =
            zMin + (zMax-zMin)*v;

        const a = 2.2;
        const c = 0.45;

        const z0 =
            (zMin+zMax)/2;

        const inside =
            1 -
            ((z-z0)*(z-z0))/(c*c);

        const r =
            a*Math.sqrt(
                Math.max(inside,0)
            );

        return {

            x:r*Math.cos(theta),
            y:r*Math.sin(theta),
            z:z

        };

    },

    matCollar

);

kingGroup.add(collar);

//////////////////////////////////////////////////////////
// PARABOLOIDE EXACTO
//////////////////////////////////////////////////////////

const crown = createSurface(

    150,
    150,

    (u,v)=>{

        const theta =
            2*Math.PI*u;

        const alpha = 2.6;

        const rho = v;

        const H = 17 - 11.8;

        const rmax =
            Math.sqrt(H);

        const r =
            alpha*rmax*rho;

        const x =
            r*Math.cos(theta);

        const y =
            r*Math.sin(theta);

        const z =
            11.8 +
            (x*x+y*y)/(alpha*alpha);

        return {

            x:x,
            y:y,
            z:z

        };

    },

    matCrown

);

kingGroup.add(crown);

//////////////////////////////////////////////////////////
// CRUZ EXACTA
//////////////////////////////////////////////////////////

function drawCube(
    x,y,z,
    size
){

    const cube =
        new THREE.Mesh(

            new THREE.BoxGeometry(
                size,
                size,
                size
            ),

            matCross

        );

    cube.position.set(
        x,y,z
    );

    kingGroup.add(cube);

}

const e = 1;

drawCube(0,0,17.5,e);
drawCube(0,0,18.5,e);
drawCube(0,0,19.5,e);

drawCube(e,0,18.5,e);
drawCube(-e,0,18.5,e);

//////////////////////////////////////////////////////////
// CAMPO VECTORIAL EXACTO
//////////////////////////////////////////////////////////

function addVector(
    x,
    y,
    z,
    u,
    v,
    w
){

    const direction =
        new THREE.Vector3(
            u,
            v,
            w
        );

    direction.normalize();

    const origin =
        new THREE.Vector3(
            x,
            y,
            z
        );

    const arrow =
        new THREE.ArrowHelper(

            direction,
            origin,

            1.4,

            0xff0000,

            0.45,

            0.22

        );

    kingGroup.add(arrow);

}

//////////////////////////////////////////////////////////
// MALLA EXACTA MATLAB
//////////////////////////////////////////////////////////

for(let x=-6;x<=6;x+=2){

    for(let y=-6;y<=6;y+=2){

        for(let z=0;z<=20;z+=3){

            let u =
                x + 2*y;

            let v =
                y*z + 1;

            let w =
                x - y*y;

            const mag =
                Math.sqrt(
                    u*u +
                    v*v +
                    w*w
                );

            u /= mag;
            v /= mag;
            w /= mag;

            addVector(
                x,
                y,
                z,
                u,
                v,
                w
            );

        }

    }

}

//////////////////////////////////////////////////////////
// INTERACCION TOUCH
//////////////////////////////////////////////////////////

let dragging = false;

let prevX = 0;
let prevY = 0;

renderer.domElement.addEventListener(
    'touchstart',
    e=>{

        dragging = true;

        prevX =
            e.touches[0].clientX;

        prevY =
            e.touches[0].clientY;

    }
);

renderer.domElement.addEventListener(
    'touchmove',
    e=>{

        if(!dragging) return;

        const dx =
            e.touches[0].clientX-prevX;

        const dy =
            e.touches[0].clientY-prevY;

        kingGroup.rotation.z +=
            dx*0.01;

        kingGroup.rotation.x +=
            dy*0.005;

        prevX =
            e.touches[0].clientX;

        prevY =
            e.touches[0].clientY;

    }
);

renderer.domElement.addEventListener(
    'touchend',
    ()=>{

        dragging = false;

    }
);

//////////////////////////////////////////////////////////
// PINCH ZOOM
//////////////////////////////////////////////////////////

let prevDist = 0;

renderer.domElement.addEventListener(
    'touchmove',
    e=>{

        if(e.touches.length===2){

            const dx =
                e.touches[0].clientX -
                e.touches[1].clientX;

            const dy =
                e.touches[0].clientY -
                e.touches[1].clientY;

            const dist =
                Math.sqrt(dx*dx+dy*dy);

            if(prevDist){

                const scale =
                    dist/prevDist;

                kingGroup.scale.multiplyScalar(
                    scale
                );

            }

            prevDist = dist;

        }

    }
);

renderer.domElement.addEventListener(
    'touchend',
    ()=>{

        prevDist = 0;

    }
);

//////////////////////////////////////////////////////////
// CAMARA REAL
//////////////////////////////////////////////////////////

startButton.onclick =
async ()=>{

    try{

        const stream =
            await navigator
            .mediaDevices
            .getUserMedia({

                video:{
                    facingMode:{
                        ideal:'environment'
                    }
                },

                audio:false

            });

        video.srcObject =
            stream;

        await video.play();

        startButton.style.display =
            'none';

    }

    catch(error){

        alert(
            'No se pudo abrir la cámara'
        );

        console.error(error);

    }

};

//////////////////////////////////////////////////////////
// ANIMACION
//////////////////////////////////////////////////////////

function animate(){

    requestAnimationFrame(
        animate
    );

    renderer.render(
        scene,
        camera
    );

}

animate();

//////////////////////////////////////////////////////////
// RESIZE
//////////////////////////////////////////////////////////

window.addEventListener(
    'resize',
    ()=>{

        camera.aspect =
            window.innerWidth /
            window.innerHeight;

        camera.updateProjectionMatrix();

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );

    }
);

</script>

</body>
</html>
