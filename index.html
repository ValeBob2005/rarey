<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">

<title>Rey Cámara AR</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
}

video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-1;
}

canvas{
    position:fixed;
    top:0;
    left:0;
}

</style>
</head>

<body>

<video id="camera" autoplay playsinline></video>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

//////////////////////////////////////////////////////////
// CAMARA REAL DEL CELULAR
//////////////////////////////////////////////////////////

const video =
    document.getElementById('camera');

navigator.mediaDevices.getUserMedia({

    video:{
        facingMode:'environment'
    }

})

.then(stream=>{

    video.srcObject = stream;

});

//////////////////////////////////////////////////////////
// ESCENA 3D
//////////////////////////////////////////////////////////

const scene = new THREE.Scene();

//////////////////////////////////////////////////////////
// CAMARA THREEJS
//////////////////////////////////////////////////////////

const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

camera.position.set(20,15,20);

//////////////////////////////////////////////////////////
// RENDER
//////////////////////////////////////////////////////////

const renderer = new THREE.WebGLRenderer({

    alpha:true,
    antialias:true

});

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

document.body.appendChild(
    renderer.domElement
);

//////////////////////////////////////////////////////////
// CONTROLES
//////////////////////////////////////////////////////////

const controls = new THREE.OrbitControls(
    camera,
    renderer.domElement
);

controls.enableDamping = true;

//////////////////////////////////////////////////////////
// LUCES
//////////////////////////////////////////////////////////

const ambient = new THREE.AmbientLight(
    0xffffff,
    1
);

scene.add(ambient);

const light = new THREE.DirectionalLight(
    0xffffff,
    1.5
);

light.position.set(10,20,10);

scene.add(light);

//////////////////////////////////////////////////////////
// MATERIALES
//////////////////////////////////////////////////////////

const matBase = new THREE.MeshPhongMaterial({

    color:0x5A96DC,
    transparent:true,
    opacity:0.45

});

const matBody = new THREE.MeshPhongMaterial({

    color:0xA0AAB4,
    transparent:true,
    opacity:0.55

});

const matGold = new THREE.MeshPhongMaterial({

    color:0xFFDC78,
    transparent:true,
    opacity:0.55

});

const matCross = new THREE.MeshPhongMaterial({

    color:0xEB7878

});

//////////////////////////////////////////////////////////
// BASE
//////////////////////////////////////////////////////////

const base = new THREE.Mesh(

    new THREE.CylinderGeometry(
        5,
        5,
        3,
        64
    ),

    matBase

);

base.position.y = 1.5;

scene.add(base);

//////////////////////////////////////////////////////////
// HIPERBOLOIDE APROXIMADO
//////////////////////////////////////////////////////////

const body = new THREE.Mesh(

    new THREE.CylinderGeometry(
        2.6,
        1.5,
        8,
        64
    ),

    matBody

);

body.position.y = 7;

scene.add(body);

//////////////////////////////////////////////////////////
// COLLAR
//////////////////////////////////////////////////////////

const collar = new THREE.Mesh(

    new THREE.TorusGeometry(
        2.2,
        0.3,
        32,
        100
    ),

    matGold

);

collar.rotation.x = Math.PI/2;

collar.position.y = 11.3;

scene.add(collar);

//////////////////////////////////////////////////////////
// CORONA
//////////////////////////////////////////////////////////

const crown = new THREE.Mesh(

    new THREE.ConeGeometry(
        3,
        5,
        64
    ),

    matGold

);

crown.position.y = 15;

scene.add(crown);

//////////////////////////////////////////////////////////
// CRUZ
//////////////////////////////////////////////////////////

const crossV = new THREE.Mesh(

    new THREE.BoxGeometry(
        0.6,
        2.5,
        0.6
    ),

    matCross

);

crossV.position.y = 18.5;

scene.add(crossV);

const crossH = new THREE.Mesh(

    new THREE.BoxGeometry(
        2,
        0.6,
        0.6
    ),

    matCross

);

crossH.position.y = 18.5;

scene.add(crossH);

//////////////////////////////////////////////////////////
// CAMPO VECTORIAL REAL
//////////////////////////////////////////////////////////

function addVector(
    x,
    y,
    z,
    u,
    v,
    w
){

    const dir =
        new THREE.Vector3(
            u,
            v,
            w
        );

    dir.normalize();

    const origin =
        new THREE.Vector3(
            x,
            y,
            z
        );

    const arrow =
        new THREE.ArrowHelper(
            dir,
            origin,
            1.3,
            0xff0000,
            0.4,
            0.2
        );

    scene.add(arrow);

}

//////////////////////////////////////////////////////////
// GENERAR CAMPO
//////////////////////////////////////////////////////////

for(let x=-6;x<=6;x+=3){

    for(let y=-6;y<=6;y+=3){

        for(let z=0;z<=20;z+=4){

            let u = x + 2*y;

            let v = y*z + 1;

            let w = x - y*y;

            let mag = Math.sqrt(
                u*u + v*v + w*w
            );

            u /= mag;
            v /= mag;
            w /= mag;

            addVector(
                x,
                z,
                y,
                u,
                v,
                w
            );

        }

    }

}

//////////////////////////////////////////////////////////
// ANIMACION
//////////////////////////////////////////////////////////

function animate(){

    requestAnimationFrame(
        animate
    );

    controls.update();

    renderer.render(
        scene,
        camera
    );

}

animate();

//////////////////////////////////////////////////////////
// RESIZE
//////////////////////////////////////////////////////////

window.addEventListener(
    'resize',
    ()=>{

        camera.aspect =
            window.innerWidth /
            window.innerHeight;

        camera.updateProjectionMatrix();

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );

    }
);

</script>

</body>
</html>
