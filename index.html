<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">

<title>Rey AR Interactivo</title>

<style>

body{
    margin:0;
    overflow:hidden;
    touch-action:none;
}

#camera{

    position:fixed;
    top:0;
    left:0;

    width:100vw;
    height:100vh;

    object-fit:cover;

    z-index:-2;

    background:black;

}

canvas{

    position:fixed;
    top:0;
    left:0;

    z-index:10;

}

#startButton{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    padding:18px 28px;

    font-size:20px;

    border:none;

    border-radius:12px;

    background:white;

    z-index:100;

}

</style>
</head>

<body>

<video
    id="camera"
    autoplay
    muted
    playsinline>
</video>

<button id="startButton">
INICIAR AR
</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

//////////////////////////////////////////////////////////
// VIDEO
//////////////////////////////////////////////////////////

const video =
    document.getElementById('camera');

const startButton =
    document.getElementById('startButton');

//////////////////////////////////////////////////////////
// ESCENA
//////////////////////////////////////////////////////////

const scene =
    new THREE.Scene();

//////////////////////////////////////////////////////////
// CAMARA
//////////////////////////////////////////////////////////

const camera =
    new THREE.PerspectiveCamera(
        60,
        window.innerWidth/window.innerHeight,
        0.1,
        1000
    );

camera.position.set(0,10,25);

//////////////////////////////////////////////////////////
// RENDER
//////////////////////////////////////////////////////////

const renderer =
    new THREE.WebGLRenderer({

        alpha:true,
        antialias:true

    });

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

document.body.appendChild(
    renderer.domElement
);

//////////////////////////////////////////////////////////
// LUCES
//////////////////////////////////////////////////////////

const ambient =
    new THREE.AmbientLight(
        0xffffff,
        1
    );

scene.add(ambient);

const light =
    new THREE.DirectionalLight(
        0xffffff,
        1.5
    );

light.position.set(10,20,10);

scene.add(light);

//////////////////////////////////////////////////////////
// GRUPO PRINCIPAL
//////////////////////////////////////////////////////////

const kingGroup =
    new THREE.Group();

scene.add(kingGroup);

//////////////////////////////////////////////////////////
// POSICION FIJA
//////////////////////////////////////////////////////////

kingGroup.position.set(
    0,
    -5,
    -20
);

//////////////////////////////////////////////////////////
// MATERIALES
//////////////////////////////////////////////////////////

const matBase =
    new THREE.MeshPhongMaterial({

        color:0x5A96DC,
        transparent:true,
        opacity:0.45

    });

const matBody =
    new THREE.MeshPhongMaterial({

        color:0xA0AAB4,
        transparent:true,
        opacity:0.55

    });

const matGold =
    new THREE.MeshPhongMaterial({

        color:0xFFDC78,
        transparent:true,
        opacity:0.55

    });

const matCross =
    new THREE.MeshPhongMaterial({

        color:0xEB7878

    });

//////////////////////////////////////////////////////////
// BASE
//////////////////////////////////////////////////////////

const base =
    new THREE.Mesh(

        new THREE.CylinderGeometry(
            5,
            5,
            3,
            64
        ),

        matBase

    );

base.position.y = 1.5;

kingGroup.add(base);

//////////////////////////////////////////////////////////
// HIPERBOLOIDE
//////////////////////////////////////////////////////////

const body =
    new THREE.Mesh(

        new THREE.CylinderGeometry(
            2.6,
            1.5,
            8,
            64
        ),

        matBody

    );

body.position.y = 7;

kingGroup.add(body);

//////////////////////////////////////////////////////////
// COLLAR
//////////////////////////////////////////////////////////

const collar =
    new THREE.Mesh(

        new THREE.TorusGeometry(
            2.2,
            0.3,
            32,
            100
        ),

        matGold

    );

collar.rotation.x =
    Math.PI/2;

collar.position.y = 11.3;

kingGroup.add(collar);

//////////////////////////////////////////////////////////
// CORONA
//////////////////////////////////////////////////////////

const crown =
    new THREE.Mesh(

        new THREE.ConeGeometry(
            3,
            5,
            64
        ),

        matGold

    );

crown.position.y = 15;

kingGroup.add(crown);

//////////////////////////////////////////////////////////
// CRUZ
//////////////////////////////////////////////////////////

const crossV =
    new THREE.Mesh(

        new THREE.BoxGeometry(
            0.6,
            2.5,
            0.6
        ),

        matCross

    );

crossV.position.y = 18.5;

kingGroup.add(crossV);

const crossH =
    new THREE.Mesh(

        new THREE.BoxGeometry(
            2,
            0.6,
            0.6
        ),

        matCross

    );

crossH.position.y = 18.5;

kingGroup.add(crossH);

//////////////////////////////////////////////////////////
// CAMPO VECTORIAL
//////////////////////////////////////////////////////////

function addVector(
    x,y,z,
    u,v,w
){

    const dir =
        new THREE.Vector3(
            u,v,w
        );

    dir.normalize();

    const origin =
        new THREE.Vector3(
            x,y,z
        );

    const arrow =
        new THREE.ArrowHelper(
            dir,
            origin,
            1.3,
            0xff0000,
            0.4,
            0.2
        );

    kingGroup.add(arrow);

}

//////////////////////////////////////////////////////////
// CAMPO EXACTO
//////////////////////////////////////////////////////////

for(let x=-6;x<=6;x+=3){

    for(let y=-6;y<=6;y+=3){

        for(let z=0;z<=20;z+=4){

            let u = x + 2*y;

            let v = y*z + 1;

            let w = x - y*y;

            let mag = Math.sqrt(
                u*u+v*v+w*w
            );

            u /= mag;
            v /= mag;
            w /= mag;

            addVector(
                x,
                z,
                y,
                u,
                v,
                w
            );

        }

    }

}

//////////////////////////////////////////////////////////
// INTERACCION TOUCH
//////////////////////////////////////////////////////////

let isDragging = false;

let previousTouchX = 0;
let previousTouchY = 0;

renderer.domElement.addEventListener(
    'touchstart',
    e=>{

        isDragging = true;

        previousTouchX =
            e.touches[0].clientX;

        previousTouchY =
            e.touches[0].clientY;

    }
);

renderer.domElement.addEventListener(
    'touchmove',
    e=>{

        if(!isDragging) return;

        const deltaX =
            e.touches[0].clientX -
            previousTouchX;

        const deltaY =
            e.touches[0].clientY -
            previousTouchY;

        kingGroup.rotation.y +=
            deltaX*0.01;

        kingGroup.rotation.x +=
            deltaY*0.005;

        previousTouchX =
            e.touches[0].clientX;

        previousTouchY =
            e.touches[0].clientY;

    }
);

renderer.domElement.addEventListener(
    'touchend',
    ()=>{

        isDragging = false;

    }
);

//////////////////////////////////////////////////////////
// ZOOM PINCH
//////////////////////////////////////////////////////////

let previousDistance = 0;

renderer.domElement.addEventListener(
    'touchmove',
    e=>{

        if(e.touches.length===2){

            const dx =
                e.touches[0].clientX -
                e.touches[1].clientX;

            const dy =
                e.touches[0].clientY -
                e.touches[1].clientY;

            const distance =
                Math.sqrt(dx*dx+dy*dy);

            if(previousDistance){

                const scaleFactor =
                    distance /
                    previousDistance;

                kingGroup.scale.multiplyScalar(
                    scaleFactor
                );

            }

            previousDistance =
                distance;

        }

    }
);

renderer.domElement.addEventListener(
    'touchend',
    ()=>{

        previousDistance = 0;

    }
);

//////////////////////////////////////////////////////////
// INICIAR CAMARA
//////////////////////////////////////////////////////////

startButton.onclick =
async ()=>{

    try{

        const stream =
            await navigator
            .mediaDevices
            .getUserMedia({

                video:{
                    facingMode:{
                        ideal:'environment'
                    }
                },

                audio:false

            });

        video.srcObject = stream;

        await video.play();

        startButton.style.display =
            'none';

    }

    catch(error){

        alert(
            'No se pudo abrir la cámara'
        );

        console.error(error);

    }

};

//////////////////////////////////////////////////////////
// ANIMACION
//////////////////////////////////////////////////////////

function animate(){

    requestAnimationFrame(
        animate
    );

    renderer.render(
        scene,
        camera
    );

}

animate();

//////////////////////////////////////////////////////////
// RESIZE
//////////////////////////////////////////////////////////

window.addEventListener(
    'resize',
    ()=>{

        camera.aspect =
            window.innerWidth /
            window.innerHeight;

        camera.updateProjectionMatrix();

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );

    }
);

</script>

</body>
</html>
