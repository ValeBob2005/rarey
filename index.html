<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Rey Matemático + Campo Vectorial</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:#050505;
}

canvas{
    display:block;
}

</style>
</head>

<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

//////////////////////////////////////////////////////////
// ESCENA
//////////////////////////////////////////////////////////

const scene = new THREE.Scene();

scene.background = new THREE.Color(0x050505);

//////////////////////////////////////////////////////////
// CAMARA
//////////////////////////////////////////////////////////

const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

camera.position.set(25,20,25);

//////////////////////////////////////////////////////////
// RENDER
//////////////////////////////////////////////////////////

const renderer = new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

document.body.appendChild(
    renderer.domElement
);

//////////////////////////////////////////////////////////
// CONTROLES
//////////////////////////////////////////////////////////

const controls = new THREE.OrbitControls(
    camera,
    renderer.domElement
);

controls.enableDamping = true;

//////////////////////////////////////////////////////////
// LUCES
//////////////////////////////////////////////////////////

const ambient = new THREE.AmbientLight(
    0xffffff,
    0.8
);

scene.add(ambient);

const light = new THREE.DirectionalLight(
    0xffffff,
    1.5
);

light.position.set(20,30,20);

scene.add(light);

//////////////////////////////////////////////////////////
// MATERIALES
//////////////////////////////////////////////////////////

const matBase = new THREE.MeshPhongMaterial({
    color:0x5A96DC,
    transparent:true,
    opacity:0.45,
    side:THREE.DoubleSide
});

const matBody = new THREE.MeshPhongMaterial({
    color:0xA0AAB4,
    transparent:true,
    opacity:0.55,
    side:THREE.DoubleSide
});

const matCollar = new THREE.MeshPhongMaterial({
    color:0xFFEBAA,
    transparent:true,
    opacity:0.55,
    side:THREE.DoubleSide
});

const matCrown = new THREE.MeshPhongMaterial({
    color:0xFFDC78,
    transparent:true,
    opacity:0.45,
    side:THREE.DoubleSide
});

const matCross = new THREE.MeshPhongMaterial({
    color:0xEB7878
});

//////////////////////////////////////////////////////////
// FUNCION SUPERFICIE PARAMETRICA
//////////////////////////////////////////////////////////

function createSurface(
    uSegments,
    vSegments,
    func,
    material
){

    const geometry = new THREE.BufferGeometry();

    const vertices = [];
    const indices = [];

    for(let i=0;i<=uSegments;i++){

        const u = i/uSegments;

        for(let j=0;j<=vSegments;j++){

            const v = j/vSegments;

            const p = func(u,v);

            vertices.push(
                p.x,
                p.y,
                p.z
            );

        }

    }

    for(let i=0;i<uSegments;i++){

        for(let j=0;j<vSegments;j++){

            const a =
                i*(vSegments+1)+j;

            const b =
                a+vSegments+1;

            const c =
                b+1;

            const d =
                a+1;

            indices.push(a,b,d);
            indices.push(b,c,d);

        }

    }

    geometry.setAttribute(
        'position',
        new THREE.Float32BufferAttribute(
            vertices,
            3
        )
    );

    geometry.setIndex(indices);

    geometry.computeVertexNormals();

    return new THREE.Mesh(
        geometry,
        material
    );

}

//////////////////////////////////////////////////////////
// BASE CILINDRO
//////////////////////////////////////////////////////////

const base = createSurface(

    100,
    100,

    (u,v)=>{

        const theta = 2*Math.PI*u;

        const z = 3*v;

        const r = 5;

        return {

            x:r*Math.cos(theta),
            y:z,
            z:r*Math.sin(theta)

        };

    },

    matBase

);

scene.add(base);

//////////////////////////////////////////////////////////
// HIPERBOLOIDE
//////////////////////////////////////////////////////////

const body = createSurface(

    120,
    120,

    (u,v)=>{

        const theta = 2*Math.PI*u;

        const zMin = 3.02;
        const zMax = 11.4;

        const z = zMin + (zMax-zMin)*v;

        const a = 1.5;
        const c = 5;

        const z0 = (zMin+zMax)/2;

        const r = a*Math.sqrt(
            1 + ((z-z0)*(z-z0))/(c*c)
        );

        return {

            x:r*Math.cos(theta),
            y:z,
            z:r*Math.sin(theta)

        };

    },

    matBody

);

scene.add(body);

//////////////////////////////////////////////////////////
// ELIPSOIDE
//////////////////////////////////////////////////////////

const collar = createSurface(

    100,
    100,

    (u,v)=>{

        const theta = 2*Math.PI*u;

        const zMin = 11.4;
        const zMax = 11.8;

        const z = zMin + (zMax-zMin)*v;

        const a = 2.2;
        const c = 0.45;

        const z0 = (zMin+zMax)/2;

        const inside =
            1 - ((z-z0)*(z-z0))/(c*c);

        const r =
            a*Math.sqrt(
                Math.max(inside,0)
            );

        return {

            x:r*Math.cos(theta),
            y:z,
            z:r*Math.sin(theta)

        };

    },

    matCollar

);

scene.add(collar);

//////////////////////////////////////////////////////////
// PARABOLOIDE
//////////////////////////////////////////////////////////

const crown = createSurface(

    120,
    120,

    (u,v)=>{

        const theta = 2*Math.PI*u;

        const alpha = 2.6;

        const rho = v;

        const rmax = Math.sqrt(5.2);

        const r = alpha*rmax*rho;

        const x = r*Math.cos(theta);

        const z = r*Math.sin(theta);

        const y =
            11.8 +
            (x*x + z*z)/(alpha*alpha);

        return {

            x:x,
            y:y,
            z:z

        };

    },

    matCrown

);

scene.add(crown);

//////////////////////////////////////////////////////////
// CRUZ
//////////////////////////////////////////////////////////

const crossV = new THREE.Mesh(

    new THREE.BoxGeometry(
        0.8,
        3,
        0.8
    ),

    matCross

);

crossV.position.set(
    0,
    18.5,
    0
);

scene.add(crossV);

const crossH = new THREE.Mesh(

    new THREE.BoxGeometry(
        3,
        0.8,
        0.8
    ),

    matCross

);

crossH.position.set(
    0,
    18.5,
    0
);

scene.add(crossH);

//////////////////////////////////////////////////////////
// CAMPO VECTORIAL EXACTO
//////////////////////////////////////////////////////////

function addVector(
    x,
    y,
    z,
    u,
    v,
    w
){

    const direction =
        new THREE.Vector3(
            u,
            v,
            w
        );

    direction.normalize();

    const origin =
        new THREE.Vector3(
            x,
            y,
            z
        );

    const length = 1.2;

    const arrow =
        new THREE.ArrowHelper(
            direction,
            origin,
            length,
            0xff0000,
            0.4,
            0.25
        );

    scene.add(arrow);

}

//////////////////////////////////////////////////////////
// GENERAR CAMPO
//////////////////////////////////////////////////////////

for(let x=-6;x<=6;x+=3){

    for(let y=-6;y<=6;y+=3){

        for(let z=0;z<=20;z+=4){

            let u = x + 2*y;

            let v = y*z + 1;

            let w = x - y*y;

            let mag = Math.sqrt(
                u*u +
                v*v +
                w*w
            );

            u /= mag;
            v /= mag;
            w /= mag;

            addVector(
                x,
                z,
                y,
                u,
                v,
                w
            );

        }

    }

}

//////////////////////////////////////////////////////////
// GRID
//////////////////////////////////////////////////////////

const grid = new THREE.GridHelper(
    40,
    40
);

scene.add(grid);

//////////////////////////////////////////////////////////
// EJES
//////////////////////////////////////////////////////////

const axes = new THREE.AxesHelper(
    10
);

scene.add(axes);

//////////////////////////////////////////////////////////
// ANIMACION
//////////////////////////////////////////////////////////

function animate(){

    requestAnimationFrame(
        animate
    );

    controls.update();

    renderer.render(
        scene,
        camera
    );

}

animate();

//////////////////////////////////////////////////////////
// RESIZE
//////////////////////////////////////////////////////////

window.addEventListener(
    'resize',
    ()=>{

        camera.aspect =
            window.innerWidth /
            window.innerHeight;

        camera.updateProjectionMatrix();

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );

    }
);

</script>

</body>
</html>
