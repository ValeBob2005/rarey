<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">

    <title>Rey AR</title>

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
    </style>
</head>

<body>

<a-scene embedded arjs>

    <a-marker preset="hiro">

        <!-- BASE -->
        <a-cylinder
            position="0 1.5 0"
            radius="2"
            height="3"
            color="#5A96DC"
            opacity="0.45">
        </a-cylinder>

        <!-- CUERPO -->
        <a-cone
            position="0 6 0"
            radius-bottom="1.6"
            radius-top="0.9"
            height="7"
            color="#A0AAB4"
            opacity="0.55">
        </a-cone>

        <!-- COLLAR -->
        <a-sphere
            position="0 9.2 0"
            radius="1.2"
            scale="1.5 0.4 1.5"
            color="#FFEBAA"
            opacity="0.65">
        </a-sphere>

        <!-- CORONA -->
        <a-cone
            position="0 12 0"
            radius-bottom="2"
            radius-top="0.2"
            height="5"
            color="#FFDC78"
            opacity="0.5">
        </a-cone>

        <!-- CRUZ VERTICAL -->
        <a-box
            position="0 15 0"
            depth="0.5"
            height="2"
            width="0.5"
            color="#EB7878">
        </a-box>

        <!-- CRUZ HORIZONTAL -->
        <a-box
            position="0 15 0"
            depth="0.5"
            height="0.5"
            width="2"
            color="#EB7878">
        </a-box>

    </a-marker>

    <a-entity camera></a-entity>

</a-scene>

</body>
</html>
